version: "3.8"

services:
  geoclaw:
    build: .
    ports:
      - "8000:8000"
      - "8001:8001"
    env_file:
      - .env.geoclaw
    environment:
      - GEOCLAW_AUTO_SCHEDULE=true
      - SCHEDULER_INTERVAL_MINUTES=30
    volumes:
      - geoclaw-data:/app/.state
      - geoclaw-logs:/app/logs
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: geoclaw
      POSTGRES_USER: geoclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geoclaw_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  geoclaw-data:
  geoclaw-logs:
  pgdata:
