version: "3.9"

services:
  geoclaw:
    build: .
    ports:
      - "8000:8000"
      - "8001:8001"
    env_file:
      - .env.geoclaw
    environment:
      - DATABASE_URL=postgresql://geoclaw:geoclaw@postgres:5432/geoclaw
      - GEOCLAW_AUTO_SCHEDULE=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geoclaw
      POSTGRES_PASSWORD: geoclaw
      POSTGRES_DB: geoclaw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
