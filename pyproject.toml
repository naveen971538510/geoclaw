[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [
    ".openclaw",
    "files",
    "static",
    "templates",
]

[tool.ruff.lint]
# Keep the lint layer deliberately conservative: errors and security-
# relevant checks only, so CI doesn't gate merges on stylistic rewrites.
# `UP` (pyupgrade) is intentionally excluded — we don't want CI to block
# on datetime.UTC vs datetime.timezone.utc style nits in unrelated code.
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
]
ignore = [
    "E402",  # top-of-file imports — main.py does some ordering for FastAPI
    "E501",  # line length handled by formatter
    "E701",  # compound statements on one line (style only)
    "E711",  # `== None` vs `is None` is style-only
    "E712",  # `== True` / `== False` comparisons (style only)
    "E722",  # bare excepts — best-effort notifiers use these intentionally
    "E731",  # lambda assignment (stylistic)
    "E741",  # ambiguous variable names (stylistic)
    "B007",  # unused loop variable (stylistic)
    "B008",  # function calls in defaults (FastAPI uses Depends(...) this way)
    "B023",  # function defined in loop (intentional in some agent code)
    "B904",  # raise-from (stylistic)
    "F811",  # redefinition — agent.py imports datetime.time on top of stdlib time
    "F841",  # unused local — lots of intentional throwaways in analytics code
    "S101",  # asserts are fine in tests
    "S104",  # bind to 0.0.0.0 is intentional on containerised deployments
    "S105",  # "possible hardcoded password" — triggers on literal strings
    "S106",  # same — keyword-arg literal strings flagged
    "S108",  # hardcoded temp path (we audit these manually)
    "S110",  # try/except/pass is intentional in best-effort notifiers
    "S112",  # try/except/continue is intentional in ingest loops
    "S113",  # requests without a timeout (TODO: audit separately)
    "S301",  # pickle — not used in hot paths, audited elsewhere
    "S307",  # eval — not used in runtime code (the matches are in comments/templates)
    "S310",  # urllib open — schemes are validated at call sites
    "S311",  # stdlib `random` is fine for non-crypto use here
    "S314",  # xml parse — not used
    "S324",  # md5/sha1 — used for cache keys, not auth
    "S603",  # subprocess.run(list) with audited args is fine
    "S605",  # shell call — only in dev scripts
    "S607",  # partial paths for osascript/notify-send are fine
    "S608",  # SQL via f-string — migration.py case is guarded by _safe_identifier
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S", "E", "F"]

[tool.bandit]
exclude_dirs = ["tests", ".openclaw", "files", "static", "templates"]
# B101  — `assert` is fine in tests and light runtime guards.
# B404  — we do import `subprocess`, and the actual calls are audited.
# B603  — subprocess.run([list], shell=False) is the safe shape.
# B310  — urllib.request.urlopen is used against hardcoded https URLs
#         (api.telegram.org). The scheme-audit check is a false positive
#         here; if you add a dynamic URL caller, re-enable B310 for that
#         file.
# B314  — xml.etree.ElementTree is used on RSS/Atom feeds from trusted
#         configured sources. Tracked as a follow-up to migrate to
#         defusedxml (see `security-findings.md` → M6 / follow-up list).
skips = ["B101", "B404", "B603", "B310", "B314"]
