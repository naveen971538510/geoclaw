<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GeoClaw — Reset password</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #04070d;
    --card: rgba(13, 19, 28, 0.78);
    --card-border: rgba(120, 170, 240, 0.10);
    --field-bg: #06101c;
    --field-border: #1d2a3d;
    --field-border-focus: #3b82f6;
    --text: #e7eefc;
    --muted: #8b99ae;
    --label: #9fb0c6;
    --accent: #3b82f6;
    --accent-hi: #5a98ff;
    --danger-bg: rgba(150, 30, 30, 0.18);
    --danger-border: rgba(220, 80, 80, 0.35);
    --danger-text: #ffc3c3;
    --ok-bg: rgba(20, 90, 45, 0.22);
    --ok-border: rgba(80, 200, 130, 0.35);
    --ok-text: #b8f5ca;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1100px 600px at 20% -10%, rgba(59, 130, 246, 0.15), transparent 60%),
                radial-gradient(900px 500px at 90% 110%, rgba(99, 102, 241, 0.12), transparent 60%),
                var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }
  .wrap { width: 100%; max-width: 400px; }
  .brand {
    display: flex; align-items: center; gap: 10px;
    margin: 0 0 14px 2px; color: #cfdaeb;
    font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
  }
  .brand .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(140deg, #3b82f6 0%, #6366f1 100%);
    box-shadow: 0 4px 14px rgba(59, 130, 246, .35), inset 0 0 0 1px rgba(255,255,255,.08);
    display: grid; place-items: center; color: #fff;
    font-weight: 700; font-size: 12px; letter-spacing: 0;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 28px 26px 22px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,.55),
                0 1px 0 rgba(255,255,255,.03) inset;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; line-height: 1.5; }
  label {
    display: block; font-size: 11px; color: var(--label);
    margin: 14px 0 6px; text-transform: uppercase; letter-spacing: .08em; font-weight: 500;
  }
  input {
    width: 100%; padding: 11px 13px; background: var(--field-bg); color: var(--text);
    border: 1px solid var(--field-border); border-radius: 8px; font-size: 14px;
    font-family: inherit; transition: border-color .15s ease, box-shadow .15s ease;
  }
  input:focus {
    outline: 0; border-color: var(--field-border-focus);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, .18);
  }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .hint.bad { color: #ffb0b0; }
  .hint.good { color: #9be5b3; }
  button[type=submit] {
    margin-top: 20px; width: 100%; padding: 12px; background: var(--accent); color: #fff;
    border: 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background .15s ease, transform .05s ease;
  }
  button[type=submit]:hover:not(:disabled) { background: var(--accent-hi); }
  button[type=submit]:active:not(:disabled) { transform: translateY(1px); }
  button[type=submit]:disabled { background: #2a3646; color: #7f8ea3; cursor: not-allowed; }
  .alert {
    margin-top: 14px; padding: 10px 12px; border-radius: 8px;
    font-size: 12.5px; line-height: 1.45; display: none;
    align-items: flex-start; gap: 8px;
  }
  .alert.show { display: flex; }
  .alert .icn { flex: 0 0 14px; margin-top: 2px; }
  .err { background: var(--danger-bg); border: 1px solid var(--danger-border); color: var(--danger-text); }
  .ok  { background: var(--ok-bg); border: 1px solid var(--ok-border); color: var(--ok-text); }
  .foot {
    margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.04);
    font-size: 12px; color: var(--muted); display: flex; justify-content: space-between;
  }
  a { color: #7fc9ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .no-token { text-align: center; padding: 8px 0 2px; }
  .no-token p { color: var(--muted); font-size: 13px; margin: 8px 0 18px; line-height: 1.55; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="mark">GC</span>GeoClaw</div>

    <form class="card" id="resetForm" autocomplete="off">
      <h1>Choose a new password</h1>
      <p class="sub">Enter a new password for your GeoClaw account. You'll be signed out of any other sessions.</p>

      <label for="password">New password</label>
      <input id="password" name="password" type="password" required minlength="8"
             autocomplete="new-password" placeholder="At least 8 characters">
      <div class="hint" id="strengthHint">&nbsp;</div>

      <label for="confirm">Confirm new password</label>
      <input id="confirm" name="confirm" type="password" required minlength="8"
             autocomplete="new-password" placeholder="Type it again">
      <div class="hint" id="matchHint">&nbsp;</div>

      <div class="alert err" id="err"><svg class="icn" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13Zm-.75 3.25a.75.75 0 0 1 1.5 0v4a.75.75 0 0 1-1.5 0v-4ZM8 12a.9.9 0 1 1 0-1.8.9.9 0 0 1 0 1.8Z"/></svg><span id="errText"></span></div>
      <div class="alert ok"  id="ok"><svg class="icn" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13Zm3.29 4.79-4 4a.75.75 0 0 1-1.06 0l-2-2a.75.75 0 1 1 1.06-1.06L6.75 8.69l3.47-3.47a.75.75 0 1 1 1.06 1.07Z"/></svg><span id="okText"></span></div>

      <button type="submit" id="submitBtn">Update password</button>

      <div class="foot">
        <a href="/login">Back to sign in</a>
        <a href="/forgot-password">Need a new link?</a>
      </div>
    </form>

    <form class="card no-token" id="noTokenCard" style="display:none">
      <h1>Link missing or broken</h1>
      <p>This reset link doesn't include a token. Request a new email to continue.</p>
      <a href="/forgot-password" style="display:inline-block;background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;font-weight:600;font-size:13px">Request new link</a>
      <p style="margin-top:16px"><a href="/login">Back to sign in</a></p>
    </form>
  </div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var token = (params.get('token') || '').trim();

  if (!token) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('noTokenCard').style.display = 'block';
    return;
  }

  var pw = document.getElementById('password');
  var cf = document.getElementById('confirm');
  var strengthHint = document.getElementById('strengthHint');
  var matchHint = document.getElementById('matchHint');
  var errEl = document.getElementById('err'), errText = document.getElementById('errText');
  var okEl = document.getElementById('ok'), okText = document.getElementById('okText');
  var btn = document.getElementById('submitBtn');

  function hide(el) { el.classList.remove('show'); }
  function show(el, t, targetText) { targetText.textContent = t; el.classList.add('show'); }

  function scorePassword(s) {
    if (!s) return '';
    if (s.length < 8) return 'bad:Too short (needs 8+)';
    var classes = 0;
    if (/[a-z]/.test(s)) classes++;
    if (/[A-Z]/.test(s)) classes++;
    if (/[0-9]/.test(s)) classes++;
    if (/[^A-Za-z0-9]/.test(s)) classes++;
    if (s.length >= 12 && classes >= 3) return 'good:Strong';
    if (classes >= 2) return 'good:Good';
    return 'bad:Add numbers or symbols for a stronger password';
  }

  pw.addEventListener('input', function () {
    var r = scorePassword(pw.value);
    if (!r) { strengthHint.textContent = '\u00A0'; strengthHint.className = 'hint'; return; }
    var parts = r.split(':');
    strengthHint.textContent = parts[1];
    strengthHint.className = 'hint ' + parts[0];
    if (cf.value) matchCheck();
  });
  function matchCheck() {
    if (!cf.value) { matchHint.textContent = '\u00A0'; matchHint.className = 'hint'; return; }
    if (cf.value === pw.value) { matchHint.textContent = 'Passwords match'; matchHint.className = 'hint good'; }
    else { matchHint.textContent = 'Passwords do not match yet'; matchHint.className = 'hint bad'; }
  }
  cf.addEventListener('input', matchCheck);

  document.getElementById('resetForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    hide(errEl); hide(okEl);
    if (pw.value.length < 8) { show(errEl, 'Password must be at least 8 characters.', errText); return; }
    if (pw.value !== cf.value) { show(errEl, 'Passwords do not match.', errText); return; }

    btn.disabled = true;
    var prev = btn.textContent;
    btn.textContent = 'Updating…';
    try {
      var res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, new_password: pw.value }),
      });
      var data = await res.json().catch(function () { return {}; });
      if (!res.ok || data.status !== 'ok') {
        var code = data.code || '';
        var msg = data.error || 'Could not reset password.';
        if (code === 'token_expired') msg = 'This reset link has expired. Request a new one.';
        else if (code === 'token_consumed') msg = 'This reset link has already been used. Request a new one if needed.';
        else if (code === 'invalid_token') msg = 'This reset link is invalid or was never issued. Request a fresh link.';
        else if (code === 'weak_password') msg = 'Password must be at least 8 characters.';
        show(errEl, msg, errText);
        return;
      }
      show(okEl, 'Password updated. Redirecting to sign in…', okText);
      setTimeout(function () { window.location.href = '/login?reset=1'; }, 1200);
    } catch (exc) {
      show(errEl, 'Network error: ' + (exc && exc.message ? exc.message : exc), errText);
    } finally {
      btn.disabled = false;
      btn.textContent = prev;
    }
  });
})();
</script>
</body>
</html>
