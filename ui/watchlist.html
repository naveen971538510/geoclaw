<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeoClaw Watchlist</title>
  <style>
    :root{--bg:#0b1016;--panel:#101722;--line:#263244;--text:#f4f7fb;--muted:#90a0b7;--green:#2fb171;--red:#d95c5c}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    nav{display:flex;gap:16px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--line);background:#0d131c;flex-wrap:wrap}
    nav a{color:#8b949e;text-decoration:none} nav strong{color:#fff}
    .page{padding:18px 20px 40px}
    .panel,.form{background:var(--panel);border:1px solid var(--line);border-radius:14px}
    .form{padding:14px;display:grid;grid-template-columns:repeat(5,minmax(0,1fr)) auto;gap:10px;margin-bottom:16px}
    .panel{padding:14px}
    input,select{background:#0d131c;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
    .btn{background:#18314e;color:#fff;border:1px solid #33567e;border-radius:10px;padding:7px 11px;cursor:pointer}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
    th{color:var(--muted);font-size:12px;text-transform:uppercase}
    .muted{color:var(--muted)}
    @media (max-width: 900px){.form{grid-template-columns:1fr}.panel{overflow:auto}}
  </style>
</head>
<body>
  <nav>
    <strong>GeoClaw</strong>
    <a class="gc-nav-link" href="/dashboard">Dashboard</a>
    <a class="gc-nav-link" href="/terminal">Terminal</a>
    <a class="gc-nav-link" href="/theses">Theses</a>
    <a class="gc-nav-link" href="/articles">Articles</a>
    <a class="gc-nav-link" href="/briefings">Briefings</a>
    <a class="gc-nav-link" href="/contradictions">Contradictions</a>
    <a class="gc-nav-link" href="/watchlist">Watchlist</a>
    <a class="gc-nav-link" href="/agent-runs">Agent Runs</a>
  </nav>
  <div class="page">
    <div class="form">
      <input id="wl-symbol" placeholder="Symbol">
      <select id="wl-asset"><option value="asset">Asset</option><option value="equity">Equity</option><option value="fx">FX</option><option value="commodity">Commodity</option><option value="crypto">Crypto</option></select>
      <select id="wl-direction"><option value="monitor">Monitor</option><option value="long">Long</option><option value="short">Short</option></select>
      <input id="wl-thesis" placeholder="Thesis key (optional)">
      <input id="wl-reason" placeholder="Reason">
      <button class="btn" id="wl-add">Add</button>
    </div>
    <div class="panel">
      <h2 style="margin-top:0">Watchlist</h2>
      <div id="wl-wrap">Loading…</div>
    </div>
  </div>
  <script>
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const activeNav = window.location.pathname;
    document.querySelectorAll('.gc-nav-link').forEach(a => {
      a.style.color = a.getAttribute('href') === activeNav ? '#e6edf3' : '#8b949e';
      a.style.fontWeight = a.getAttribute('href') === activeNav ? '600' : '400';
    });
    let watchItems = [];
    async function loadWatchlist(){
      const data = await fetch('/api/watchlist').then(r => r.json());
      watchItems = data.items || [];
      renderWatchlist();
      refreshPrices();
    }
    function renderWatchlist(priceMap = {}){
      const wrap = document.getElementById('wl-wrap');
      if (!watchItems.length){
        wrap.innerHTML = '<div class="muted">No watchlist items yet. Add symbols you want to monitor.</div>';
        return;
      }
      wrap.innerHTML = `<table><thead><tr><th>Symbol</th><th>Price</th><th>Asset</th><th>Direction</th><th>Thesis</th><th>Reason</th><th>Added</th><th></th></tr></thead><tbody>
        ${watchItems.map(item => {
          const price = priceMap[item.symbol] || {};
          return `<tr>
            <td><strong>${esc(item.symbol || item.id || '')}</strong></td>
            <td>${price.price == null ? '—' : `${Number(price.price).toLocaleString(undefined,{maximumFractionDigits:2})} (${Number(price.change_pct || 0) >= 0 ? '+' : ''}${Number(price.change_pct || 0).toFixed(2)}%)`}</td>
            <td>${esc(item.asset_type || '')}</td>
            <td>${esc(item.direction || '')}</td>
            <td>${item.thesis_key ? `<a href="/theses" style="color:#8ab4ff">${esc(item.thesis_key)}</a>` : '—'}</td>
            <td>${esc(item.reason || '')}</td>
            <td>${esc(item.added_at || '')}</td>
            <td><button class="btn" onclick="removeWatch(${JSON.stringify(item.id || item.symbol)})">Remove</button></td>
          </tr>`;
        }).join('')}
      </tbody></table>`;
    }
    async function refreshPrices(){
      const symbols = watchItems.map(i => i.symbol).filter(Boolean);
      if (!symbols.length) return;
      try{
        const data = await fetch('/api/prices?symbols=' + encodeURIComponent(symbols.join(','))).then(r => r.json());
        const map = {};
        (data.prices || []).forEach(item => { map[item.symbol] = item; });
        renderWatchlist(map);
      }catch(e){
        renderWatchlist();
      }
    }
    async function addWatch(){
      const payload = {
        symbol: document.getElementById('wl-symbol').value,
        asset_type: document.getElementById('wl-asset').value,
        direction: document.getElementById('wl-direction').value,
        thesis_key: document.getElementById('wl-thesis').value,
        reason: document.getElementById('wl-reason').value
      };
      await fetch('/api/watchlist', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
      ['wl-symbol','wl-thesis','wl-reason'].forEach(id => document.getElementById(id).value = '');
      loadWatchlist();
    }
    async function removeWatch(id){
      await fetch('/api/watchlist/' + encodeURIComponent(id), {method:'DELETE'});
      loadWatchlist();
    }
    document.getElementById('wl-add').addEventListener('click', addWatch);
    loadWatchlist().catch(() => { document.getElementById('wl-wrap').textContent = 'Could not load watchlist.'; });
    setInterval(refreshPrices, 60000);
  </script>
</body>
</html>
