<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>GeoClaw — Sign in</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #04070d;
    --card: rgba(13, 19, 28, 0.78);
    --card-border: rgba(120, 170, 240, 0.10);
    --field-bg: #06101c;
    --field-border: #1d2a3d;
    --field-border-focus: #3b82f6;
    --text: #e7eefc;
    --muted: #8b99ae;
    --label: #9fb0c6;
    --accent: #3b82f6;
    --accent-hi: #5a98ff;
    --danger-bg: rgba(150, 30, 30, 0.18);
    --danger-border: rgba(220, 80, 80, 0.35);
    --danger-text: #ffc3c3;
    --ok-bg: rgba(20, 90, 45, 0.22);
    --ok-border: rgba(80, 200, 130, 0.35);
    --ok-text: #b8f5ca;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1100px 600px at 20% -10%, rgba(59, 130, 246, 0.15), transparent 60%),
                radial-gradient(900px 500px at 90% 110%, rgba(99, 102, 241, 0.12), transparent 60%),
                var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 400px; }
  .brand {
    display: flex; align-items: center; gap: 10px;
    margin: 0 0 14px 2px; color: #cfdaeb;
    font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
  }
  .brand .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(140deg, #3b82f6 0%, #6366f1 100%);
    box-shadow: 0 4px 14px rgba(59, 130, 246, .35), inset 0 0 0 1px rgba(255,255,255,.08);
    display: grid; place-items: center; color: #fff;
    font-weight: 700; font-size: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 28px 26px 22px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,.55),
                0 1px 0 rgba(255,255,255,.03) inset;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; line-height: 1.5; }
  .tabs {
    display: flex; gap: 4px; margin-bottom: 16px; padding: 4px;
    background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.04);
    border-radius: 10px;
  }
  .tab {
    flex: 1; padding: 8px; font-size: 13px; text-align: center; cursor: pointer;
    color: var(--muted); border-radius: 7px; user-select: none;
    transition: background .15s ease, color .15s ease;
  }
  .tab:hover:not(.active) { color: #cfdaeb; }
  .tab.active { color: #fff; background: rgba(59,130,246,.18); box-shadow: inset 0 0 0 1px rgba(90,152,255,.25); }
  label {
    display: block; font-size: 11px; color: var(--label);
    margin: 14px 0 6px; text-transform: uppercase; letter-spacing: .08em; font-weight: 500;
  }
  label .muted { text-transform: none; letter-spacing: 0; color: var(--muted); font-weight: 400; }
  .label-row { display: flex; justify-content: space-between; align-items: baseline; }
  .label-row a { font-size: 11px; color: #7fc9ff; text-transform: none; letter-spacing: 0; }
  input {
    width: 100%; padding: 11px 13px; background: var(--field-bg); color: var(--text);
    border: 1px solid var(--field-border); border-radius: 8px; font-size: 14px;
    font-family: inherit; transition: border-color .15s ease, box-shadow .15s ease;
  }
  input:focus {
    outline: 0; border-color: var(--field-border-focus);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, .18);
  }
  button[type=submit] {
    margin-top: 20px; width: 100%; padding: 12px; background: var(--accent); color: #fff;
    border: 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background .15s ease, transform .05s ease;
  }
  button[type=submit]:hover:not(:disabled) { background: var(--accent-hi); }
  button[type=submit]:active:not(:disabled) { transform: translateY(1px); }
  button[type=submit]:disabled { background: #2a3646; color: #7f8ea3; cursor: not-allowed; }
  .alert {
    margin-top: 14px; padding: 10px 12px; border-radius: 8px;
    font-size: 12.5px; line-height: 1.45; display: none;
    align-items: flex-start; gap: 8px;
  }
  .alert.show { display: flex; }
  .alert .icn { flex: 0 0 14px; margin-top: 2px; }
  .err { background: var(--danger-bg); border: 1px solid var(--danger-border); color: var(--danger-text); }
  .ok  { background: var(--ok-bg); border: 1px solid var(--ok-border); color: var(--ok-text); }
  .foot {
    margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.04);
    font-size: 11px; color: #6b7a8c; line-height: 1.5;
  }
  a { color: #7fc9ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="mark">GC</span>GeoClaw</div>

    <form class="card" id="authForm" autocomplete="on">
      <h1>Welcome to GeoClaw</h1>
      <p class="sub">Educational market intelligence — sign in to personalize your signals, theses and portfolio.</p>

      <div class="tabs" role="tablist">
        <div class="tab active" data-mode="login"  role="tab" tabindex="0">Sign in</div>
        <div class="tab"        data-mode="signup" role="tab" tabindex="0">Create account</div>
      </div>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@domain.com">

      <div class="label-row">
        <label for="password">Password <span class="muted" id="pwHint">(min 8 chars)</span></label>
        <a href="/forgot-password" id="forgotLink">Forgot?</a>
      </div>
      <input id="password" name="password" type="password" required minlength="8" autocomplete="current-password" placeholder="••••••••">

      <div id="nameWrap" style="display:none">
        <label for="displayName">Display name <span class="muted">(optional)</span></label>
        <input id="displayName" name="displayName" type="text" autocomplete="nickname" placeholder="How should we greet you?">
      </div>

      <div class="alert err" id="err" role="alert" aria-live="assertive"><svg class="icn" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13Zm-.75 3.25a.75.75 0 0 1 1.5 0v4a.75.75 0 0 1-1.5 0v-4ZM8 12a.9.9 0 1 1 0-1.8.9.9 0 0 1 0 1.8Z"/></svg><span id="errText"></span></div>
      <div class="alert ok"  id="ok"  role="status" aria-live="polite"><svg class="icn" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13Zm3.29 4.79-4 4a.75.75 0 0 1-1.06 0l-2-2a.75.75 0 1 1 1.06-1.06L6.75 8.69l3.47-3.47a.75.75 0 1 1 1.06 1.07Z"/></svg><span id="okText"></span></div>

      <button type="submit" id="submitBtn">Sign in</button>

      <p class="foot">
        Not financial advice. GeoClaw is an educational research tool. Signals, theses, and backtests
        are informational only.
      </p>
    </form>
  </div>

<script>
(function () {
  var mode = 'login';
  var tabs = document.querySelectorAll('.tab');
  var submitBtn = document.getElementById('submitBtn');
  var nameWrap = document.getElementById('nameWrap');
  var pwInput = document.getElementById('password');
  var forgotLink = document.getElementById('forgotLink');
  var errEl = document.getElementById('err'), errText = document.getElementById('errText');
  var okEl  = document.getElementById('ok'),  okText  = document.getElementById('okText');

  function hide(el) { el.classList.remove('show'); }
  function show(el, t, target) { target.textContent = t; el.classList.add('show'); }

  function setMode(next) {
    mode = next;
    tabs.forEach(function (t) { t.classList.toggle('active', t.dataset.mode === mode); });
    submitBtn.textContent = mode === 'login' ? 'Sign in' : 'Create account';
    nameWrap.style.display = mode === 'signup' ? 'block' : 'none';
    forgotLink.style.visibility = mode === 'signup' ? 'hidden' : 'visible';
    pwInput.setAttribute('autocomplete', mode === 'login' ? 'current-password' : 'new-password');
    hide(errEl); hide(okEl);
  }
  tabs.forEach(function (t) {
    t.addEventListener('click', function () { setMode(t.dataset.mode); });
    t.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setMode(t.dataset.mode); }
    });
  });

  // Surface post-reset confirmation when redirected from /reset-password
  try {
    var q = new URLSearchParams(window.location.search);
    if (q.get('reset') === '1') show(okEl, 'Password updated — sign in with your new password.', okText);
    if (q.get('verified') === '1') show(okEl, 'Email verified. Welcome to GeoClaw.', okText);
  } catch (_) {}

  document.getElementById('authForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    hide(errEl); hide(okEl);
    submitBtn.disabled = true;
    var prev = submitBtn.textContent;
    submitBtn.textContent = mode === 'login' ? 'Signing in…' : 'Creating…';
    var body = {
      email: document.getElementById('email').value.trim(),
      password: pwInput.value,
    };
    if (mode === 'signup') body.display_name = document.getElementById('displayName').value.trim() || null;
    try {
      var res = await fetch('/api/auth/' + mode, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      var data = await res.json().catch(function () { return {}; });
      if (!res.ok || data.status !== 'ok') {
        show(errEl, data.error || ('Request failed (' + res.status + ')'), errText);
        return;
      }
      // localStorage may throw in Safari private mode or when disabled by
      // browser policy. Detect and surface the failure — otherwise the user
      // lands on /dashboard, immediately 401s, and gets bounced back here
      // in an infinite loop with no explanation.
      var storageOk = true;
      try {
        localStorage.setItem('gc_access_token', data.access_token);
        if (localStorage.getItem('gc_access_token') !== data.access_token) storageOk = false;
      } catch (_) { storageOk = false; }
      try { localStorage.setItem('gc_user', JSON.stringify(data.user || {})); } catch (_) {}
      if (!storageOk) {
        show(errEl, 'Your browser is blocking local storage — please disable private/incognito mode (or allow storage for this site) and try again.', errText);
        return;
      }
      show(okEl, mode === 'signup' ? 'Account created. Redirecting…' : 'Signed in. Redirecting…', okText);
      setTimeout(function () { window.location.href = '/dashboard'; }, 600);
    } catch (exc) {
      show(errEl, 'Network error: ' + (exc && exc.message ? exc.message : exc), errText);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = prev;
    }
  });
})();
</script>
</body>
</html>
