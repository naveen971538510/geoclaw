<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeoClaw Theses</title>
  <style>
    :root{--bg:#0b1016;--panel:#101722;--panel2:#161f2d;--line:#263244;--text:#f4f7fb;--muted:#90a0b7;--green:#2fb171;--blue:#4da3ff;--yellow:#d39a33;--red:#d95c5c}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    nav{display:flex;gap:16px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--line);background:#0d131c;flex-wrap:wrap}
    nav a{color:#8b949e;text-decoration:none}
    nav strong{color:#fff}
    .page{padding:18px 20px 40px}
    .toolbar,.card,.drill{background:var(--panel);border:1px solid var(--line);border-radius:14px}
    .toolbar{padding:12px 14px;display:grid;grid-template-columns:auto auto 1fr auto;gap:10px;align-items:center;margin-bottom:16px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .gc-tab{background:#161f2d;border:1px solid var(--line);color:var(--muted);padding:8px 12px;border-radius:999px;cursor:pointer}
    .gc-tab.active{color:#fff;border-color:#4da3ff}
    input,select{background:#0d131c;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
    .range-wrap{display:flex;gap:8px;align-items:center;justify-self:end}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:10px}
    .card{padding:14px}
    .toprow,.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .conf{font-size:30px;font-weight:800}
    .muted{color:var(--muted)}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;border:1px solid var(--line);margin-left:6px}
    .bar{height:8px;border-radius:999px;background:#1b2430;overflow:hidden;margin:12px 0}
    .bar > div{height:100%}
    .btn{background:#18314e;color:#fff;border:1px solid #33567e;border-radius:10px;padding:7px 11px;cursor:pointer}
    .meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}
    .meta .box{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px}
    .drill{margin-top:12px;padding:12px}
    .prices{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:10px}
    .price{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px}
    .empty{color:var(--muted);padding:16px;border:1px dashed var(--line);border-radius:12px}
    @media (max-width: 900px){.toolbar{grid-template-columns:1fr}.range-wrap{justify-self:start}.meta{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <nav>
    <strong>GeoClaw</strong>
    <a class="gc-nav-link" href="/dashboard">Dashboard</a>
    <a class="gc-nav-link" href="/terminal">Terminal</a>
    <a class="gc-nav-link" href="/ask">Ask</a>
    <a class="gc-nav-link" href="/live">Live</a>
    <a class="gc-nav-link" href="/theses">Theses</a>
    <a class="gc-nav-link" href="/articles">Articles</a>
    <a class="gc-nav-link" href="/briefings">Briefings</a>
    <a class="gc-nav-link" href="/contradictions">Contradictions</a>
    <a class="gc-nav-link" href="/watchlist">Watchlist</a>
    <a class="gc-nav-link" href="/portfolio">Portfolio</a>
    <a class="gc-nav-link" href="/agent-runs">Agent Runs</a>
  </nav>
  <div class="page">
    <div class="toolbar">
      <div class="tabs">
        <button class="gc-tab active" data-status="all">All</button>
        <button class="gc-tab" data-status="confirmed">Confirmed</button>
        <button class="gc-tab" data-status="active">Active</button>
        <button class="gc-tab" data-status="weakened">Weakened</button>
        <button class="gc-tab" data-status="superseded">Superseded</button>
      </div>
      <select id="gc-sort">
        <option value="conf">Confidence↓</option>
        <option value="updated">Updated↓</option>
        <option value="evidence">Evidence↓</option>
        <option value="velocity">Velocity↓</option>
      </select>
      <input id="gc-thesis-search" placeholder="Filter theses…">
      <div class="range-wrap">
        <label for="gc-min-conf">Min confidence</label>
        <input type="range" min="0" max="100" value="0" id="gc-min-conf">
        <span id="gc-min-conf-val">0%</span>
      </div>
    </div>
    <div id="gc-theses-grid" class="grid">
      <div class="empty">Loading theses…</div>
    </div>
  </div>
  <script>
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    let gcAllTheses = [];
    let gcExpanded = '';
    const gcDebates = {};
    const pct = (v) => Math.round(Number(v || 0) * 100);
    const velArrow = (v) => Number(v || 0) > 0.02 ? '<span style="color:#2fb171">↑</span>' : (Number(v || 0) < -0.02 ? '<span style="color:#d95c5c">↓</span>' : '<span style="color:#90a0b7">→</span>');
    const barColor = (v) => Number(v || 0) >= 0.75 ? 'var(--green)' : (Number(v || 0) >= 0.45 ? 'var(--yellow)' : 'var(--red)');
    const activeNav = window.location.pathname;
    document.querySelectorAll('.gc-nav-link').forEach(a => {
      a.style.color = a.getAttribute('href') === activeNav ? '#e6edf3' : '#8b949e';
      a.style.fontWeight = a.getAttribute('href') === activeNav ? '600' : '400';
    });
    async function gcLoadTheses() {
      const d = await fetch('/terminal/theses?limit=500').then(r => r.json());
      gcAllTheses = d.theses || d.items || [];
      gcRenderTheses();
    }
    function gcThesisCardHTML(t) {
      const conf = Number(t.confidence || 0);
      const status = String(t.status || 'active');
      const isOpen = gcExpanded === String(t.thesis_key || '');
      return `<div class="card">
        <div class="toprow">
          <div>
            <div class="conf" style="color:${barColor(conf)}">${pct(conf)}% ${velArrow(t.confidence_velocity || 0)}</div>
            <div class="muted">${esc(t.title || t.current_claim || t.thesis_key || '')}</div>
          </div>
          <div>
            <span class="pill">${esc(status)}</span>
            <span class="pill">${esc(t.timeframe || 'unclear')}</span>
          </div>
        </div>
        <div class="bar"><div style="width:${pct(conf)}%;background:${barColor(conf)}"></div></div>
        <div>${esc(t.current_claim || t.thesis_key || '')}</div>
        <div class="muted" style="margin-top:8px">${esc(t.last_update_reason || 'No update reason recorded yet.')}</div>
        <div class="meta">
          <div class="box"><strong>Terminal risk</strong><div class="muted">${esc(t.terminal_risk || 'n/a')}</div></div>
          <div class="box"><strong>Watchlist</strong><div class="muted">${esc(t.watchlist_suggestion || 'n/a')}</div></div>
          <div class="box"><strong>Evidence</strong><div class="muted">${esc(String(t.evidence_count || 0))}</div></div>
          <div class="box"><strong>Velocity</strong><div class="muted">${esc(String(Number(t.confidence_velocity || 0).toFixed(3)))}</div></div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" onclick="gcToggleDrilldown(${JSON.stringify(String(t.thesis_key || ''))})">🔍 Why this happened</button>
          <button class="btn" onclick="gcToggleDrilldown(${JSON.stringify(String(t.thesis_key || ''))}, true)">📈 Related prices</button>
          <button class="btn" onclick="gcOpenDebate(${JSON.stringify(String(t.thesis_key || ''))})">⚡ Bull vs Bear</button>
        </div>
        ${isOpen ? `<div class="drill" id="drill-${esc(t.thesis_key || '')}">Loading drilldown…</div>` : ''}
      </div>`;
    }
    function gcRenderTheses() {
      const search = (document.getElementById('gc-thesis-search')?.value || '').toLowerCase();
      const minConf = Number(document.getElementById('gc-min-conf')?.value || '0') / 100;
      const tab = document.querySelector('.gc-tab.active')?.dataset.status || 'all';
      const sort = document.getElementById('gc-sort')?.value || 'conf';
      let theses = gcAllTheses.filter(t => {
        if (tab !== 'all' && String(t.status || '') !== tab) return false;
        if (Number(t.confidence || 0) < minConf) return false;
        if (search && !String(t.thesis_key || '').toLowerCase().includes(search) && !String(t.current_claim || '').toLowerCase().includes(search)) return false;
        return true;
      });
      theses.sort((a, b) => {
        if (sort === 'conf') return Number(b.confidence || 0) - Number(a.confidence || 0);
        if (sort === 'evidence') return Number(b.evidence_count || 0) - Number(a.evidence_count || 0);
        if (sort === 'velocity') return Math.abs(Number(b.confidence_velocity || 0)) - Math.abs(Number(a.confidence_velocity || 0));
        return String(b.last_updated_at || '').localeCompare(String(a.last_updated_at || ''));
      });
      const grid = document.getElementById('gc-theses-grid');
      grid.innerHTML = theses.length ? theses.map(gcThesisCardHTML).join('') : '<div class="empty">No theses match filters.</div>';
      if (gcExpanded) gcRenderDrilldown(gcExpanded);
    }
    async function gcToggleDrilldown(thesisKey, pricesOnly = false) {
      gcExpanded = gcExpanded === thesisKey && !pricesOnly ? '' : thesisKey;
      gcRenderTheses();
      if (gcExpanded) gcRenderDrilldown(thesisKey, pricesOnly);
    }
    async function gcRenderDrilldown(thesisKey, pricesOnly = false) {
      const holder = document.querySelector('#gc-theses-grid .drill');
      if (!holder || !thesisKey) return;
      try {
        const drill = await fetch('/terminal/drilldown/' + encodeURIComponent(thesisKey)).then(r => r.json()).then(d => d.item || {});
        let prices = [];
        let predictions = [];
        try {
          const p = await fetch('/api/prices/' + encodeURIComponent(thesisKey)).then(r => r.json());
          prices = p.prices || [];
        } catch (e) {}
        try {
          const pred = await fetch('/api/predictions?limit=10&thesis_key=' + encodeURIComponent(thesisKey)).then(r => r.json());
          predictions = pred.predictions || [];
        } catch (e) {}
        const debate = gcDebates[thesisKey] || null;
        const resolvedPredictions = predictions.filter(p => String(p.outcome || 'pending') !== 'pending');
        const verifiedPredictions = resolvedPredictions.filter(p => String(p.outcome || '') === 'verified').length;
        const thesisAccuracy = resolvedPredictions.length ? Math.round((verifiedPredictions / resolvedPredictions.length) * 100) : null;
        holder.innerHTML = `${!pricesOnly ? `<div><strong>Articles</strong><div class="muted">${(drill.trace?.articles || []).map(a => esc(a.headline || a.title || '')).join(' · ') || 'No linked article trace yet.'}</div></div>
          <div style="margin-top:10px"><strong>Reasoning</strong><div class="muted">${(drill.reasoning || []).map(r => ((r.chain || []).map(h => `${h.hop}. ${h.from} → ${h.to}`).join(' | '))).join('<br>') || 'No reasoning chain yet.'}</div></div>
          <div style="margin-top:10px"><strong>Actions</strong><div class="muted">${(drill.actions || []).map(a => esc(`${a.action_type || 'action'} · ${a.status || ''}`)).join(' · ') || 'No linked actions.'}</div></div>
          <div style="margin-top:10px"><strong>Predictions</strong><div class="muted">${predictions.length ? predictions.map(p => `${esc(p.symbol || 'n/a')} · ${esc(p.predicted_direction || 'n/a')} · ${esc(p.outcome || 'pending')} · ${p.actual_change_pct == null ? 'n/a' : `${Number(p.actual_change_pct).toFixed(2)}%`}`).join('<br>') : 'No tracked predictions yet.'}</div>${thesisAccuracy == null ? '' : `<div class="muted" style="margin-top:6px">Prediction accuracy for this thesis: ${thesisAccuracy}%</div>`}</div>
          ${debate ? gcDebateHTML(debate) : ''}` : ''}
          <div style="margin-top:10px"><strong>📈 Related prices</strong><div class="prices">${prices.length ? prices.map(p => `<div class="price"><div><strong>${esc(p.symbol)}</strong></div><div>${p.price == null ? '—' : Number(p.price).toLocaleString(undefined,{maximumFractionDigits:2})}</div><div class="muted">${Number(p.change_pct || 0) >= 0 ? '+' : ''}${Number(p.change_pct || 0).toFixed(2)}%</div></div>`).join('') : '<div class="muted">Price feed unavailable.</div>'}</div></div>`;
      } catch (e) {
        holder.innerHTML = '<div class="muted">Could not load drilldown.</div>';
      }
    }
    function gcDebateHTML(debate){
      const powered = debate.mode === 'llm' ? 'Powered by GeoClaw AI' : 'Rule-based fallback';
      return `<div style="margin-top:10px">
        <strong>⚡ Bull vs Bear</strong>
        <div class="muted" style="margin-top:4px">${esc(powered)}</div>
        <div class="meta" style="margin-top:10px">
          <div class="box" style="border-color:rgba(47,177,113,.35)">
            <strong style="color:#8ff0b2">${esc((debate.bull || {}).persona || 'Bull')}</strong>
            <div class="muted" style="margin-top:6px">${esc((debate.bull || {}).argument || '')}</div>
            <div class="pill" style="margin-left:0;margin-top:8px">${esc((debate.bull || {}).key_point || '')}</div>
          </div>
          <div class="box" style="border-color:rgba(217,92,92,.35)">
            <strong style="color:#ffb3b3">${esc((debate.bear || {}).persona || 'Bear')}</strong>
            <div class="muted" style="margin-top:6px">${esc((debate.bear || {}).argument || '')}</div>
            <div class="pill" style="margin-left:0;margin-top:8px">${esc((debate.bear || {}).key_point || '')}</div>
          </div>
        </div>
        <div class="box" style="margin-top:10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px">
          <strong>Verdict</strong>
          <div class="muted" style="margin-top:4px">${esc(debate.verdict || '')}</div>
        </div>
      </div>`;
    }
    async function gcOpenDebate(thesisKey){
      if (!thesisKey) return;
      gcExpanded = thesisKey;
      gcRenderTheses();
      if (!gcDebates[thesisKey]) {
        try {
          const result = await fetch('/api/debate/' + encodeURIComponent(thesisKey)).then(r => r.json());
          gcDebates[thesisKey] = result.debate || null;
        } catch (e) {
          gcDebates[thesisKey] = {
            mode: 'rule_based',
            bull: {persona: 'Bull', argument: 'Could not load debate.', key_point: 'Unavailable'},
            bear: {persona: 'Bear', argument: 'Could not load debate.', key_point: 'Unavailable'},
            verdict: 'Debate unavailable.'
          };
        }
      } else {
        delete gcDebates[thesisKey];
      }
      gcRenderDrilldown(thesisKey);
    }
    document.querySelectorAll('.gc-tab').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.gc-tab').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      gcRenderTheses();
    }));
    document.getElementById('gc-sort').addEventListener('change', gcRenderTheses);
    document.getElementById('gc-thesis-search').addEventListener('input', gcRenderTheses);
    document.getElementById('gc-min-conf').addEventListener('input', (e) => {
      document.getElementById('gc-min-conf-val').textContent = `${e.target.value}%`;
      gcRenderTheses();
    });
    gcLoadTheses().catch(() => {
      document.getElementById('gc-theses-grid').innerHTML = '<div class="empty">Could not load theses.</div>';
    });
  </script>
</body>
</html>
