app = "geoclaw"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  GEOCLAW_AUTO_SCHEDULE = "true"
  # Set this to the IP of Fly's edge proxy (or "127.0.0.1" when terminating
  # TLS on the same machine) so rate_limit can honour X-Forwarded-For from
  # the known proxy only. See middleware/rate_limit.py.
  # GEOCLAW_TRUSTED_PROXIES = "127.0.0.1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# NOTE: port 8001 (main.py legacy FastAPI app) was previously exposed here.
# It has been removed because main.py does not enforce tenant scoping and
# exposing it alongside the scoped dashboard_api would allow cross-tenant
# reads/writes. See AUDIT_FINDINGS.md §A for details.

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
