app = "geoclaw"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  GEOCLAW_AUTO_SCHEDULE = "true"
  SCHEDULER_INTERVAL_MINUTES = "30"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[services]]
  internal_port = 8001
  protocol = "tcp"

  [[services.ports]]
    port = 8001
    handlers = ["tls", "http"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
